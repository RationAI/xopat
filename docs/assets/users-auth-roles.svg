<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 420" font-family="'Inter','Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L9,5 L0,10 Z" fill="#9B7CFF"/>
    </marker>
  </defs>

  <!-- ============ HEADERS ============ -->
  <text x="160" y="26" text-anchor="middle" font-size="11" font-weight="700" fill="#FF8B7A" letter-spacing="3">AUTH HANDLERS</text>
  <text x="525" y="26" text-anchor="middle" font-size="11" font-weight="700" fill="#FF8B7A" letter-spacing="3">MULTI-CONTEXT IDENTITY</text>
  <text x="900" y="26" text-anchor="middle" font-size="11" font-weight="700" fill="#FF8B7A" letter-spacing="3">ROLES &amp; CAPABILITY GATES</text>

  <!-- ============ ZONE A: AUTH HANDLERS ============ -->
  <g>
    <rect x="30" y="50" width="260" height="42" rx="10" fill="#1A2160" stroke="#9B7CFF" stroke-width="1.5" stroke-dasharray="5 3"/>
    <text x="160" y="76" text-anchor="middle" font-size="14" font-weight="600" fill="#E2E8F5">No Auth</text>

    <rect x="30" y="102" width="260" height="42" rx="10" fill="#1A2160" stroke="#7C5CFF" stroke-width="1.5"/>
    <text x="160" y="128" text-anchor="middle" font-size="14" font-weight="600" fill="#E2E8F5">OIDC</text>

    <rect x="30" y="154" width="260" height="42" rx="10" fill="#1A2160" stroke="#FF8B7A" stroke-width="1.5"/>
    <text x="160" y="180" text-anchor="middle" font-size="14" font-weight="600" fill="#E2E8F5">+ Custom Handler</text>

    <text x="160" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#FF8B7A" letter-spacing="2">REGISTERED VIA</text>
    <text x="160" y="240" text-anchor="middle" font-size="11" font-family="'JetBrains Mono',Consolas,monospace" fill="#9B7CFF">HttpClient.registerAuthHandler</text>

    <line x1="60" y1="265" x2="260" y2="265" stroke="#7C5CFF" stroke-width="1" opacity="0.6"/>

    <text x="160" y="287" text-anchor="middle" font-size="11" fill="#9B7CFF" font-style="italic">OIDC = SSO via external IDP</text>
    <text x="160" y="305" text-anchor="middle" font-size="11" fill="#9B7CFF" font-style="italic">No Auth fits public deployments</text>
    <text x="160" y="323" text-anchor="middle" font-size="11" fill="#9B7CFF" font-style="italic">add any scheme via custom handler</text>
  </g>

  <!-- Bracket A → B -->
  <g stroke="#9B7CFF" stroke-width="1.4" fill="none">
    <line x1="290" y1="71"  x2="312" y2="71"/>
    <line x1="290" y1="123" x2="312" y2="123"/>
    <line x1="290" y1="175" x2="312" y2="175"/>
    <line x1="312" y1="71"  x2="312" y2="175"/>
    <line x1="312" y1="123" x2="375" y2="123" marker-end="url(#ar)"/>
  </g>

  <!-- ============ ZONE B: IDENTITY ============ -->
  <g>
    <!-- User card -->
    <rect x="395" y="50" width="260" height="90" rx="12" fill="#1A2160" stroke="#FF8B7A" stroke-width="2"/>
    <circle cx="438" cy="84" r="12" fill="#FF8B7A"/>
    <path d="M 418 118 Q 438 100 458 118 L 458 128 L 418 128 Z" fill="#FF8B7A"/>
    <text x="478" y="84" font-size="15" font-weight="700" fill="#E2E8F5">xOpat USER</text>
    <text x="478" y="105" font-size="11" fill="#9B7CFF">single identity</text>
    <text x="478" y="121" font-size="11" fill="#9B7CFF">many contexts</text>

    <!-- arrow down -->
    <line x1="525" y1="140" x2="525" y2="180" stroke="#9B7CFF" stroke-width="1.5" marker-end="url(#ar)"/>

    <!-- Contexts label -->
    <text x="525" y="200" text-anchor="middle" font-size="10" font-weight="700" fill="#FF8B7A" letter-spacing="2.5">PARALLEL LOGIN CONTEXTS</text>

    <!-- Context chips -->
    <rect x="395" y="213" width="260" height="34" rx="8" fill="#1A2160" stroke="#7C5CFF" stroke-width="1.5"/>
    <text x="412" y="235" font-size="13" font-weight="600" fill="#E2E8F5">core</text>
    <text x="640" y="235" text-anchor="end" font-size="11" font-family="'JetBrains Mono',Consolas,monospace" fill="#FF8B7A">OIDC</text>

    <rect x="395" y="255" width="260" height="34" rx="8" fill="#1A2160" stroke="#9B7CFF" stroke-width="1.5" stroke-dasharray="5 3"/>
    <text x="412" y="277" font-size="13" font-weight="600" fill="#E2E8F5">public-tiles</text>
    <text x="640" y="277" text-anchor="end" font-size="11" font-family="'JetBrains Mono',Consolas,monospace" fill="#FF8B7A">No Auth</text>

    <rect x="395" y="297" width="260" height="34" rx="8" fill="#1A2160" stroke="#FF8B7A" stroke-width="1.5"/>
    <text x="412" y="319" font-size="13" font-weight="600" fill="#E2E8F5">llm-anthropic</text>
    <text x="640" y="319" text-anchor="end" font-size="11" font-family="'JetBrains Mono',Consolas,monospace" fill="#FF8B7A">Custom</text>

    <text x="525" y="355" text-anchor="middle" font-size="11" fill="#9B7CFF" font-style="italic">HttpClient routes per target · refresh on 401</text>
  </g>

  <!-- Arrow B → C -->
  <line x1="665" y1="190" x2="730" y2="190" stroke="#9B7CFF" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ============ ZONE C: ROLES + GATES ============ -->
  <g>
    <!-- Admin -->
    <rect x="745" y="50" width="335" height="68" rx="10" fill="#1A2160" stroke="#7C5CFF" stroke-width="1.5"/>
    <text x="765" y="72" font-size="13" font-weight="700" fill="#E2E8F5" letter-spacing="1.5">ADMIN</text>
    <text x="1065" y="72" text-anchor="end" font-size="10" font-weight="600" fill="#FF8B7A" letter-spacing="1.5">grant: *</text>
    <text x="765" y="92" font-size="10.5" font-family="'JetBrains Mono',Consolas,monospace" fill="#9B7CFF">annotations.*</text>
    <text x="765" y="108" font-size="10.5" font-family="'JetBrains Mono',Consolas,monospace" fill="#9B7CFF">annotations.export-as-svg</text>

    <!-- Editor -->
    <rect x="745" y="128" width="335" height="68" rx="10" fill="#1A2160" stroke="#7C5CFF" stroke-width="1.5"/>
    <text x="765" y="150" font-size="13" font-weight="700" fill="#E2E8F5" letter-spacing="1.5">EDITOR</text>
    <text x="1065" y="150" text-anchor="end" font-size="10" font-weight="600" fill="#FF8B7A" letter-spacing="1.5">extends viewer</text>
    <text x="765" y="170" font-size="10.5" font-family="'JetBrains Mono',Consolas,monospace" fill="#9B7CFF">annotations.crud:annotation</text>
    <text x="765" y="186" font-size="10.5" font-family="'JetBrains Mono',Consolas,monospace" fill="#9B7CFF">.create · .update · .delete</text>

    <!-- Viewer -->
    <rect x="745" y="206" width="335" height="68" rx="10" fill="#1A2160" stroke="#7C5CFF" stroke-width="1.5"/>
    <text x="765" y="228" font-size="13" font-weight="700" fill="#E2E8F5" letter-spacing="1.5">VIEWER</text>
    <text x="1065" y="228" text-anchor="end" font-size="10" font-weight="600" fill="#FF8B7A" letter-spacing="1.5">default</text>
    <text x="765" y="248" font-size="10.5" font-family="'JetBrains Mono',Consolas,monospace" fill="#9B7CFF">annotations.crud:annotation.read</text>
    <text x="765" y="264" font-size="10.5" font-family="'JetBrains Mono',Consolas,monospace" fill="#9B7CFF">annotations.ui.toolbar</text>

    <!-- Auto-derive note -->
    <text x="912" y="293" text-anchor="middle" font-size="10" fill="#9B7CFF" font-style="italic">caps auto-derived from io.capabilities[]</text>

    <!-- UI gate strip -->
    <text x="912" y="313" text-anchor="middle" font-size="10" font-weight="700" fill="#FF8B7A" letter-spacing="2">REACTIVE UI · this.can() + onChange()</text>

    <rect x="750" y="324" width="100" height="32" rx="6" fill="#FF8B7A"/>
    <text x="800" y="345" text-anchor="middle" font-size="12" font-weight="700" fill="#1A0A06">✓ Annotate</text>

    <rect x="862" y="324" width="100" height="32" rx="6" fill="#FF8B7A"/>
    <text x="912" y="345" text-anchor="middle" font-size="12" font-weight="700" fill="#1A0A06">✓ View</text>

    <rect x="974" y="324" width="100" height="32" rx="6" fill="#1A2160" stroke="#9B7CFF" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="1024" y="345" text-anchor="middle" font-size="12" font-weight="700" fill="#9B7CFF">✗ Manage</text>

    <text x="912" y="378" text-anchor="middle" font-size="11" fill="#9B7CFF" font-style="italic">backend stays the source of truth</text>
  </g>
</svg>
