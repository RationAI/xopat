<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 420" font-family="'Inter','Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L9,5 L0,10 Z" fill="#9B7CFF"/>
    </marker>
  </defs>

  <!-- ============ HEADERS ============ -->
  <text x="160" y="26" text-anchor="middle" font-size="11" font-weight="700" fill="#FF8B7A" letter-spacing="3">CAPABILITIES</text>
  <text x="525" y="26" text-anchor="middle" font-size="11" font-weight="700" fill="#FF8B7A" letter-spacing="3">ADMIN-BOUND ROUTER</text>
  <text x="900" y="26" text-anchor="middle" font-size="11" font-weight="700" fill="#FF8B7A" letter-spacing="3">SINKS</text>

  <!-- ============ ZONE A: CAPABILITIES ============ -->
  <g>
    <rect x="30" y="50" width="260" height="38" rx="10" fill="#1A2160" stroke="#7C5CFF" stroke-width="1.5"/>
    <text x="160" y="74" text-anchor="middle" font-size="13" font-weight="600" fill="#E2E8F5">bundle-export</text>

    <rect x="30" y="96" width="260" height="38" rx="10" fill="#1A2160" stroke="#7C5CFF" stroke-width="1.5"/>
    <text x="160" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#E2E8F5">crud:annotation</text>

    <rect x="30" y="142" width="260" height="38" rx="10" fill="#1A2160" stroke="#7C5CFF" stroke-width="1.5"/>
    <text x="160" y="166" text-anchor="middle" font-size="13" font-weight="600" fill="#E2E8F5">kv:cache</text>

    <rect x="30" y="188" width="260" height="38" rx="10" fill="#1A2160" stroke="#7C5CFF" stroke-width="1.5"/>
    <text x="160" y="212" text-anchor="middle" font-size="13" font-weight="600" fill="#E2E8F5">kv:cookies</text>

    <rect x="30" y="234" width="260" height="38" rx="10" fill="#1A2160" stroke="#7C5CFF" stroke-width="1.5"/>
    <text x="160" y="258" text-anchor="middle" font-size="13" font-weight="600" fill="#E2E8F5">kv:data</text>

    <rect x="30" y="280" width="260" height="38" rx="10" fill="#1A2160" stroke="#FF8B7A" stroke-width="1.5"/>
    <text x="160" y="304" text-anchor="middle" font-size="13" font-weight="600" fill="#E2E8F5">+ custom namespace</text>

    <text x="160" y="345" text-anchor="middle" font-size="11" fill="#9B7CFF" font-style="italic">declared by plugins in include.json</text>
  </g>

  <!-- Bracket converging A → B -->
  <g stroke="#9B7CFF" stroke-width="1.4" fill="none">
    <line x1="290" y1="69"  x2="312" y2="69"/>
    <line x1="290" y1="115" x2="312" y2="115"/>
    <line x1="290" y1="161" x2="312" y2="161"/>
    <line x1="290" y1="207" x2="312" y2="207"/>
    <line x1="290" y1="253" x2="312" y2="253"/>
    <line x1="290" y1="299" x2="312" y2="299"/>
    <line x1="312" y1="69"  x2="312" y2="299"/>
    <line x1="312" y1="184" x2="370" y2="184" marker-end="url(#ar)"/>
  </g>

  <!-- ============ ZONE B: IO_PIPELINE ============ -->
  <g>
    <!-- Main router card -->
    <rect x="390" y="50" width="290" height="245" rx="12" fill="#1A2160" stroke="#FF8B7A" stroke-width="2"/>
    <text x="535" y="80" text-anchor="middle" font-size="16" font-weight="700" fill="#E2E8F5" letter-spacing="0.5">IO_PIPELINE</text>
    <text x="535" y="100" text-anchor="middle" font-size="11" fill="#9B7CFF">routes capabilities → sinks</text>

    <!-- Divider -->
    <line x1="415" y1="116" x2="655" y2="116" stroke="#7C5CFF" stroke-width="1"/>
    <text x="535" y="134" text-anchor="middle" font-size="10" font-weight="700" fill="#FF8B7A" letter-spacing="2">ADMIN BINDINGS · EXAMPLE</text>

    <!-- Mini binding table -->
    <g font-family="'JetBrains Mono',Consolas,monospace" font-size="11" fill="#E2E8F5">
      <text x="410" y="158">bundle-export</text>
      <text x="660" y="158" text-anchor="end" fill="#FF8B7A">file + github</text>

      <text x="410" y="180">crud:annotation</text>
      <text x="660" y="180" text-anchor="end" fill="#FF8B7A">dicom-sink</text>

      <text x="410" y="202">kv:cache</text>
      <text x="660" y="202" text-anchor="end" fill="#FF8B7A">localStorage</text>

      <text x="410" y="224">kv:cookies</text>
      <text x="660" y="224" text-anchor="end" fill="#FF8B7A">cookies</text>

      <text x="410" y="246">kv:data</text>
      <text x="660" y="246" text-anchor="end" fill="#FF8B7A">github</text>
    </g>

    <!-- Divider -->
    <line x1="415" y1="262" x2="655" y2="262" stroke="#7C5CFF" stroke-width="1"/>
    <text x="535" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#9B7CFF">offline writes → IndexedDB outbox</text>

    <!-- Footnote -->
    <text x="535" y="320" text-anchor="middle" font-size="11" fill="#9B7CFF" font-style="italic">bound per deployment · ENV.client.io.bindings</text>
  </g>

  <!-- Bracket diverging B → C -->
  <g stroke="#9B7CFF" stroke-width="1.4" fill="none">
    <line x1="700" y1="184" x2="758" y2="184" marker-end="url(#ar)"/>
  </g>
  <g stroke="#9B7CFF" stroke-width="1.4" fill="none">
    <line x1="758" y1="69"  x2="780" y2="69"/>
    <line x1="758" y1="115" x2="780" y2="115"/>
    <line x1="758" y1="161" x2="780" y2="161"/>
    <line x1="758" y1="207" x2="780" y2="207"/>
    <line x1="758" y1="253" x2="780" y2="253"/>
    <line x1="758" y1="299" x2="780" y2="299"/>
    <line x1="758" y1="69"  x2="758" y2="299"/>
  </g>

  <!-- ============ ZONE C: SINKS ============ -->
  <g>
    <rect x="780" y="50" width="290" height="38" rx="10" fill="#1A2160" stroke="#7C5CFF" stroke-width="1.5"/>
    <text x="925" y="74" text-anchor="middle" font-size="13" font-weight="600" fill="#E2E8F5">file-download</text>

    <rect x="780" y="96" width="290" height="38" rx="10" fill="#1A2160" stroke="#7C5CFF" stroke-width="1.5"/>
    <text x="925" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#E2E8F5">github-sink</text>

    <rect x="780" y="142" width="290" height="38" rx="10" fill="#1A2160" stroke="#7C5CFF" stroke-width="1.5"/>
    <text x="925" y="166" text-anchor="middle" font-size="13" font-weight="600" fill="#E2E8F5">dicom-sink</text>

    <rect x="780" y="188" width="290" height="38" rx="10" fill="#1A2160" stroke="#7C5CFF" stroke-width="1.5"/>
    <text x="925" y="212" text-anchor="middle" font-size="13" font-weight="600" fill="#E2E8F5">localStorage</text>

    <rect x="780" y="234" width="290" height="38" rx="10" fill="#1A2160" stroke="#7C5CFF" stroke-width="1.5"/>
    <text x="925" y="258" text-anchor="middle" font-size="13" font-weight="600" fill="#E2E8F5">cookies</text>

    <rect x="780" y="280" width="290" height="38" rx="10" fill="#1A2160" stroke="#FF8B7A" stroke-width="1.5"/>
    <text x="925" y="304" text-anchor="middle" font-size="13" font-weight="600" fill="#E2E8F5">+ custom sink</text>

    <text x="925" y="345" text-anchor="middle" font-size="11" fill="#9B7CFF" font-style="italic">registered at runtime</text>
  </g>
</svg>
