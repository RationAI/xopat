<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1320" font-family="'Inter','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="gradSession" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB088"/>
      <stop offset="100%" stop-color="#FF8B7A"/>
    </linearGradient>
    <linearGradient id="gradCache" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B7299"/>
      <stop offset="100%" stop-color="#3B4170"/>
    </linearGradient>
    <linearGradient id="gradAdmin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B7CFF"/>
      <stop offset="100%" stop-color="#5B3FE0"/>
    </linearGradient>
    <radialGradient id="gradHub" cx="50%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E4FF"/>
    </radialGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hubGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <marker id="arrW" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L9,5 L0,10 Z" fill="#FFFFFF" opacity="0.75"/>
    </marker>
    <marker id="arrCoralL" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M9,0 L0,5 L9,10 Z" fill="#FFB088"/>
    </marker>
    <marker id="arrCoralR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L9,5 L0,10 Z" fill="#FFB088"/>
    </marker>
    <marker id="arrPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L9,5 L0,10 Z" fill="#9B7CFF"/>
    </marker>
  </defs>

  <!-- ============ TOP ROW: Session  ⇄  Cache (peers) ============ -->
  <g filter="url(#softGlow)" opacity="0.95">
    <rect x="20" y="20" width="490" height="180" rx="20" fill="url(#gradSession)"/>
  </g>
  <rect x="20" y="20" width="490" height="180" rx="20" fill="url(#gradSession)"/>
  <text x="45" y="62" font-size="22" font-weight="700" fill="#FFFFFF" letter-spacing="0.5">SESSION PARAMS</text>
  <text x="490" y="62" text-anchor="end" font-size="11" font-weight="500" fill="#FFFFFF" opacity="0.85" letter-spacing="2">PER-LOAD · DYNAMIC</text>
  <text x="45" y="104" font-size="19" font-weight="600" fill="#FFFFFF">What to view this time</text>
  <text x="45" y="142" font-size="14" fill="#FFFFFF" opacity="0.92">Slides · layout · plugins for this visit</text>
  <text x="45" y="168" font-size="13" fill="#FFFFFF" opacity="0.75">Who's looking · what they brought along</text>

  <g filter="url(#softGlow)" opacity="0.92">
    <rect x="590" y="20" width="490" height="180" rx="20" fill="url(#gradCache)"/>
  </g>
  <rect x="590" y="20" width="490" height="180" rx="20" fill="url(#gradCache)"/>
  <text x="615" y="62" font-size="22" font-weight="700" fill="#FFFFFF" letter-spacing="0.5">CACHE</text>
  <text x="1060" y="62" text-anchor="end" font-size="11" font-weight="500" fill="#FFFFFF" opacity="0.85" letter-spacing="2">PER-USER · DURABLE</text>
  <text x="615" y="104" font-size="19" font-weight="600" fill="#FFFFFF">What was here last time</text>
  <text x="615" y="142" font-size="14" fill="#FFFFFF" opacity="0.92">User toggles · restored state · undo</text>
  <text x="615" y="168" font-size="13" fill="#FFFFFF" opacity="0.75">Continuity across reloads</text>

  <!-- Interaction indicator between Session and Cache -->
  <line x1="520" y1="110" x2="555" y2="110" stroke="#FFB088" stroke-width="2" marker-end="url(#arrCoralR)"/>
  <line x1="580" y1="125" x2="545" y2="125" stroke="#FFB088" stroke-width="2" marker-end="url(#arrCoralL)"/>
  <text x="550" y="83" text-anchor="middle" font-size="10" font-weight="600" fill="#FFB088" letter-spacing="1.5">CONTEXT</text>
  <text x="550" y="160" text-anchor="middle" font-size="10" font-weight="600" fill="#FFB088" letter-spacing="1.5">DEPENDENT</text>

  <!-- "bounded by" connectors from Session/Cache down to Admin -->
  <line x1="265" y1="206" x2="265" y2="248" stroke="#FFFFFF" stroke-width="1.4" opacity="0.55" marker-end="url(#arrW)"/>
  <line x1="835" y1="206" x2="835" y2="248" stroke="#FFFFFF" stroke-width="1.4" opacity="0.55" marker-end="url(#arrW)"/>
  <text x="550" y="232" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" opacity="0.65" letter-spacing="3">BOUNDED BY ADMIN POLICY</text>

  <!-- ============ ADMIN (policy floor) ============ -->
  <g filter="url(#softGlow)" opacity="0.95">
    <rect x="20" y="258" width="1060" height="180" rx="20" fill="url(#gradAdmin)"/>
  </g>
  <rect x="20" y="258" width="1060" height="180" rx="20" fill="url(#gradAdmin)"/>
  <text x="45" y="300" font-size="22" font-weight="700" fill="#FFFFFF" letter-spacing="0.5">ADMIN CONFIG</text>
  <text x="1060" y="300" text-anchor="end" font-size="11" font-weight="500" fill="#FFFFFF" opacity="0.85" letter-spacing="2">DEPLOY-TIME · POLICY FLOOR</text>
  <text x="45" y="342" font-size="19" font-weight="600" fill="#FFFFFF">What the deployment allows</text>
  <text x="45" y="380" font-size="14" fill="#FFFFFF" opacity="0.92">Proxies · auth · IO routing · roles · slide protocols · sinks</text>
  <text x="45" y="406" font-size="13" fill="#FFFFFF" opacity="0.75">Sensitive policy — never overridable from session or cache</text>

  <!-- Lock glyph on admin -->
  <g transform="translate(1040, 395)" opacity="0.9">
    <rect x="-9" y="-3" width="18" height="14" rx="2" fill="#FFFFFF"/>
    <path d="M -5.5 -3 V -8 a 5.5 5.5 0 0 1 11 0 V -3" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="0" cy="4" r="1.6" fill="#5B3FE0"/>
  </g>

  <!-- ============ FLOW INTO HUB ============ -->
  <line x1="550" y1="442" x2="550" y2="495" stroke="#9B7CFF" stroke-width="2.2" opacity="0.85" marker-end="url(#arrPurple)"/>
  <text x="550" y="518" text-anchor="middle" font-size="11" font-weight="700" fill="#FFB088" letter-spacing="4">DRIVES</text>

  <!-- ============ SPOKE LINES (drawn before chips so chips sit on top) ============ -->
  <g stroke="#9B7CFF" stroke-width="1.6" opacity="0.7" fill="none">
    <!-- Hub center (550, 870), hub radius 140, chip ring radius 370 -->
    <!-- 7 chips, angles in SVG convention (0 = right, 90 = down). Symmetric around bottom. -->
    <!-- θ = -30° (upper-right) -->
    <line x1="671" y1="800" x2="801" y2="725"/>
    <!-- θ = 10° (right) -->
    <line x1="688" y1="894" x2="794" y2="934"/>
    <!-- θ = 50° (lower-right) -->
    <line x1="640" y1="977" x2="755" y2="1113"/>
    <!-- θ = 90° (bottom) -->
    <line x1="550" y1="1010" x2="550" y2="1200"/>
    <!-- θ = 130° (lower-left) -->
    <line x1="460" y1="977" x2="346" y2="1113"/>
    <!-- θ = 170° (left) -->
    <line x1="412" y1="894" x2="306" y2="934"/>
    <!-- θ = 210° (upper-left) -->
    <line x1="429" y1="800" x2="299" y2="725"/>
  </g>

  <!-- ============ HUB ============ -->
  <g filter="url(#hubGlow)">
    <circle cx="550" cy="870" r="140" fill="url(#gradHub)"/>
  </g>
  <circle cx="550" cy="870" r="140" fill="url(#gradHub)"/>
  <circle cx="550" cy="870" r="140" fill="none" stroke="#9B7CFF" stroke-width="2" opacity="0.5"/>
  <text x="550" y="856" text-anchor="middle" font-size="28" font-weight="700" fill="#050A30" letter-spacing="-0.5">xOpat</text>
  <text x="550" y="891" text-anchor="middle" font-size="28" font-weight="700" fill="#050A30" letter-spacing="-0.5">Core</text>
  <text x="550" y="922" text-anchor="middle" font-size="12" font-weight="500" fill="#5B3FE0" opacity="0.8" letter-spacing="2">RUNTIME · LOADER</text>

  <!-- ============ SPOKE CHIPS (7) ============ -->
  <g>
    <!-- 1. Upper-right: User & Roles  (870, 685) chip 240×80 -->
    <rect x="750" y="645" width="240" height="80" rx="14" fill="#293178" fill-opacity="0.7" stroke="#9B7CFF" stroke-width="1.6"/>
    <text x="870" y="678" text-anchor="middle" font-size="16" font-weight="600" fill="#FFFFFF">User &amp; Roles</text>
    <text x="870" y="704" text-anchor="middle" font-size="12" fill="#FFB088" opacity="0.95">Identity · capabilities · UI gating</text>

    <!-- 2. Right: Proxy Routing  (914, 934) -->
    <rect x="794" y="894" width="240" height="80" rx="14" fill="#293178" fill-opacity="0.7" stroke="#9B7CFF" stroke-width="1.6"/>
    <text x="914" y="927" text-anchor="middle" font-size="16" font-weight="600" fill="#FFFFFF">Proxy Routing</text>
    <text x="914" y="953" text-anchor="middle" font-size="12" fill="#FFB088" opacity="0.95">Upstream HTTP · auth contexts</text>

    <!-- 3. Lower-right: IO Pipeline  (788, 1153) -->
    <rect x="668" y="1113" width="240" height="80" rx="14" fill="#293178" fill-opacity="0.7" stroke="#9B7CFF" stroke-width="1.6"/>
    <text x="788" y="1146" text-anchor="middle" font-size="16" font-weight="600" fill="#FFFFFF">IO Pipeline</text>
    <text x="788" y="1172" text-anchor="middle" font-size="12" fill="#FFB088" opacity="0.95">Persistence routing &amp; sinks</text>

    <!-- 4. Bottom: Visualization · Shaders  (550, 1240) -->
    <rect x="430" y="1200" width="240" height="80" rx="14" fill="#293178" fill-opacity="0.7" stroke="#9B7CFF" stroke-width="1.6"/>
    <text x="550" y="1233" text-anchor="middle" font-size="16" font-weight="600" fill="#FFFFFF">Visualization · Shaders</text>
    <text x="550" y="1259" text-anchor="middle" font-size="12" fill="#FFB088" opacity="0.95">WebGL composition layers</text>

    <!-- 5. Lower-left: Slide Protocols  (313, 1153) -->
    <rect x="193" y="1113" width="240" height="80" rx="14" fill="#293178" fill-opacity="0.7" stroke="#9B7CFF" stroke-width="1.6"/>
    <text x="313" y="1146" text-anchor="middle" font-size="16" font-weight="600" fill="#FFFFFF">Slide Protocols</text>
    <text x="313" y="1172" text-anchor="middle" font-size="12" fill="#FFB088" opacity="0.95">Tile sources · DICOM · DZI · custom</text>

    <!-- 6. Left: Multi-Viewport  (186, 934) -->
    <rect x="66" y="894" width="240" height="80" rx="14" fill="#293178" fill-opacity="0.7" stroke="#9B7CFF" stroke-width="1.6"/>
    <text x="186" y="927" text-anchor="middle" font-size="16" font-weight="600" fill="#FFFFFF">Multi-Viewport</text>
    <text x="186" y="953" text-anchor="middle" font-size="12" fill="#FFB088" opacity="0.95">Concurrent OSD viewers</text>

    <!-- 7. Upper-left: Plugins · Modules  (230, 685) -->
    <rect x="110" y="645" width="240" height="80" rx="14" fill="#293178" fill-opacity="0.7" stroke="#9B7CFF" stroke-width="1.6"/>
    <text x="230" y="678" text-anchor="middle" font-size="16" font-weight="600" fill="#FFFFFF">Plugins · Modules</text>
    <text x="230" y="704" text-anchor="middle" font-size="12" fill="#FFB088" opacity="0.95">Dynamic discovery &amp; wiring</text>
  </g>
</svg>
