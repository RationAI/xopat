<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 430" font-family="'Inter','Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L9,5 L0,10 Z" fill="#9B7CFF"/>
    </marker>
  </defs>

  <!-- ============ HEADERS ============ -->
  <text x="160" y="26" text-anchor="middle" font-size="11" font-weight="700" fill="#FF8B7A" letter-spacing="3">TILE SOURCES</text>
  <text x="515" y="26" text-anchor="middle" font-size="11" font-weight="700" fill="#FF8B7A" letter-spacing="3">TYPE-DRIVEN CONVERSION GRAPH</text>
  <text x="905" y="26" text-anchor="middle" font-size="11" font-weight="700" fill="#FF8B7A" letter-spacing="3">VISUALIZATION  (FLEX RENDERER)</text>

  <!-- ============ ZONE A: TILE SOURCES — 3 CATEGORIES ============ -->
  <!-- RASTER -->
  <g>
    <rect x="25" y="50" width="270" height="125" rx="12" fill="#1A2160" stroke="#7C5CFF" stroke-width="1.5"/>
    <text x="42" y="71" font-size="12" font-weight="700" fill="#FF8B7A" letter-spacing="2">RASTER</text>
    <text x="278" y="71" text-anchor="end" font-size="10" fill="#9B7CFF" font-style="italic">pixel-based</text>
    <!-- chips row 1 -->
    <rect x="40" y="82" width="55" height="22" rx="5" fill="none" stroke="#7C5CFF" stroke-width="1"/>
    <text x="67.5" y="98" text-anchor="middle" font-size="11" fill="#E2E8F5">DZI</text>
    <rect x="103" y="82" width="55" height="22" rx="5" fill="none" stroke="#7C5CFF" stroke-width="1"/>
    <text x="130.5" y="98" text-anchor="middle" font-size="11" fill="#E2E8F5">IIIF</text>
    <rect x="166" y="82" width="105" height="22" rx="5" fill="none" stroke="#7C5CFF" stroke-width="1"/>
    <text x="218.5" y="98" text-anchor="middle" font-size="11" fill="#E2E8F5">WSI-Service</text>
    <!-- chips row 2 -->
    <rect x="40" y="112" width="100" height="22" rx="5" fill="none" stroke="#7C5CFF" stroke-width="1"/>
    <text x="90" y="128" text-anchor="middle" font-size="11" fill="#E2E8F5">DICOM-Web</text>
    <rect x="148" y="112" width="123" height="22" rx="5" fill="none" stroke="#FF8B7A" stroke-width="1"/>
    <text x="209.5" y="128" text-anchor="middle" font-size="11" fill="#E2E8F5">+ more raster</text>
    <text x="160" y="158" text-anchor="middle" font-size="10" fill="#9B7CFF" font-style="italic">multichannel · pyramidal · packed</text>
  </g>

  <!-- VECTOR -->
  <g>
    <rect x="25" y="187" width="270" height="80" rx="12" fill="#1A2160" stroke="#7C5CFF" stroke-width="1.5"/>
    <text x="42" y="208" font-size="12" font-weight="700" fill="#FF8B7A" letter-spacing="2">VECTOR</text>
    <text x="278" y="208" text-anchor="end" font-size="10" fill="#9B7CFF" font-style="italic">geometry-based</text>
    <rect x="40" y="219" width="60" height="22" rx="5" fill="none" stroke="#7C5CFF" stroke-width="1"/>
    <text x="70" y="235" text-anchor="middle" font-size="11" fill="#E2E8F5">MVT</text>
    <rect x="108" y="219" width="80" height="22" rx="5" fill="none" stroke="#7C5CFF" stroke-width="1"/>
    <text x="148" y="235" text-anchor="middle" font-size="11" fill="#E2E8F5">GeoJSON</text>
    <rect x="196" y="219" width="75" height="22" rx="5" fill="none" stroke="#FF8B7A" stroke-width="1"/>
    <text x="233.5" y="235" text-anchor="middle" font-size="11" fill="#E2E8F5">+ more</text>
    <text x="160" y="258" text-anchor="middle" font-size="10" fill="#9B7CFF" font-style="italic">features · tessellated · streamed</text>
  </g>

  <!-- CUSTOM -->
  <g>
    <rect x="25" y="279" width="270" height="62" rx="12" fill="#1A2160" stroke="#FF8B7A" stroke-width="1.5"/>
    <text x="42" y="300" font-size="12" font-weight="700" fill="#FF8B7A" letter-spacing="2">CUSTOM</text>
    <text x="278" y="300" text-anchor="end" font-size="10" fill="#9B7CFF" font-style="italic">plugin-defined</text>
    <text x="160" y="328" text-anchor="middle" font-size="12" fill="#E2E8F5">+ any tile-source format</text>
  </g>

  <!-- Bracket A → B -->
  <g stroke="#9B7CFF" stroke-width="1.4" fill="none">
    <line x1="295" y1="112" x2="318" y2="112"/>
    <line x1="295" y1="227" x2="318" y2="227"/>
    <line x1="295" y1="310" x2="318" y2="310"/>
    <line x1="318" y1="112" x2="318" y2="310"/>
    <line x1="318" y1="195" x2="375" y2="195" marker-end="url(#ar)"/>
  </g>

  <!-- ============ ZONE B: CONVERSION GRAPH ============ -->
  <g>
    <rect x="380" y="50" width="290" height="291" rx="12" fill="#1A2160" stroke="#FF8B7A" stroke-width="2"/>
    <text x="525" y="80" text-anchor="middle" font-size="16" font-weight="700" fill="#E2E8F5" letter-spacing="0.5">CONVERSION GRAPH</text>
    <text x="525" y="100" text-anchor="middle" font-size="11" fill="#9B7CFF">data-type nodes · plug-and-play</text>

    <line x1="405" y1="116" x2="645" y2="116" stroke="#7C5CFF" stroke-width="1"/>

    <!-- column headers -->
    <text x="420" y="136" font-size="10" font-weight="700" fill="#FF8B7A" letter-spacing="1.5">PAYLOAD TYPE</text>
    <text x="630" y="136" text-anchor="end" font-size="10" font-weight="700" fill="#FF8B7A" letter-spacing="1.5">GPU TYPE</text>

    <!-- Conversion rows -->
    <g font-family="'JetBrains Mono',Consolas,monospace" font-size="11" fill="#E2E8F5">
      <text x="420" y="160">raster tile</text>
      <text x="540" y="160" text-anchor="middle" fill="#9B7CFF">──→</text>
      <text x="630" y="160" text-anchor="end" fill="#FF8B7A">texture set</text>

      <text x="420" y="182">multichannel</text>
      <text x="540" y="182" text-anchor="middle" fill="#9B7CFF">──→</text>
      <text x="630" y="182" text-anchor="end" fill="#FF8B7A">channel pack</text>

      <text x="420" y="204">probability map</text>
      <text x="540" y="204" text-anchor="middle" fill="#9B7CFF">──→</text>
      <text x="630" y="204" text-anchor="end" fill="#FF8B7A">float texture</text>

      <text x="420" y="226">vector tile</text>
      <text x="540" y="226" text-anchor="middle" fill="#9B7CFF">──→</text>
      <text x="630" y="226" text-anchor="end" fill="#FF8B7A">vertex buffer</text>

      <text x="420" y="248">geometry features</text>
      <text x="540" y="248" text-anchor="middle" fill="#9B7CFF">──→</text>
      <text x="630" y="248" text-anchor="end" fill="#FF8B7A">vertex buffer</text>

      <text x="420" y="272" fill="#FF8B7A">+ custom type</text>
      <text x="540" y="272" text-anchor="middle" fill="#9B7CFF">──→</text>
      <text x="630" y="272" text-anchor="end" fill="#FF8B7A">+ custom GPU</text>
    </g>

    <line x1="405" y1="287" x2="645" y2="287" stroke="#7C5CFF" stroke-width="1"/>
    <text x="525" y="307" text-anchor="middle" font-size="11" font-weight="600" fill="#9B7CFF">register a node · not patch the renderer</text>
    <text x="525" y="328" text-anchor="middle" font-size="11" fill="#9B7CFF" font-style="italic">OSD + Flex drawer type-driven dispatch</text>
  </g>

  <!-- Arrow B → C -->
  <line x1="675" y1="195" x2="730" y2="195" stroke="#9B7CFF" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ============ ZONE C: FLEX RENDERER (hierarchy: UI Controls → Shader Layers) ============ -->
  <g>
    <!-- Outer Flex Renderer container -->
    <rect x="735" y="50" width="345" height="330" rx="12" fill="#1A2160" stroke="#FF8B7A" stroke-width="2"/>
    <text x="907.5" y="80" text-anchor="middle" font-size="16" font-weight="700" fill="#E2E8F5" letter-spacing="0.5">FLEX RENDERER</text>
    <text x="907.5" y="100" text-anchor="middle" font-size="11" fill="#9B7CFF">compose · stack · blend</text>

    <!-- Inner: UI Controls (parent / driver) -->
    <rect x="750" y="115" width="315" height="78" rx="10" fill="none" stroke="#7C5CFF" stroke-width="1.5"/>
    <text x="767" y="135" font-size="12" font-weight="700" fill="#FF8B7A" letter-spacing="1.5">UI CONTROLS</text>
    <text x="1050" y="135" text-anchor="end" font-size="10" fill="#9B7CFF" font-style="italic">parent category</text>
    <text x="767" y="158" font-size="12" fill="#E2E8F5">opacity · blending · mode</text>
    <text x="767" y="178" font-size="12" fill="#E2E8F5">filters · channels · + custom</text>

    <!-- "drives" arrow -->
    <line x1="907" y1="195" x2="907" y2="222" stroke="#9B7CFF" stroke-width="2" marker-end="url(#ar)"/>
    <text x="920" y="212" font-size="10" font-weight="700" fill="#FF8B7A" letter-spacing="2">DRIVES</text>

    <!-- Inner: Shader Layers (child) -->
    <rect x="750" y="225" width="315" height="145" rx="10" fill="none" stroke="#7C5CFF" stroke-width="1.5"/>
    <text x="767" y="245" font-size="12" font-weight="700" fill="#FF8B7A" letter-spacing="1.5">SHADER LAYERS</text>
    <text x="1050" y="245" text-anchor="end" font-size="10" fill="#9B7CFF" font-style="italic">composable</text>

    <!-- shader chips -->
    <rect x="763" y="258" width="68" height="22" rx="5" fill="none" stroke="#7C5CFF" stroke-width="1"/>
    <text x="797" y="274" text-anchor="middle" font-size="11" fill="#E2E8F5">identity</text>
    <rect x="838" y="258" width="55" height="22" rx="5" fill="none" stroke="#7C5CFF" stroke-width="1"/>
    <text x="865.5" y="274" text-anchor="middle" font-size="11" fill="#E2E8F5">color</text>
    <rect x="900" y="258" width="75" height="22" rx="5" fill="none" stroke="#7C5CFF" stroke-width="1"/>
    <text x="937.5" y="274" text-anchor="middle" font-size="11" fill="#E2E8F5">colormap</text>
    <rect x="982" y="258" width="68" height="22" rx="5" fill="none" stroke="#7C5CFF" stroke-width="1"/>
    <text x="1016" y="274" text-anchor="middle" font-size="11" fill="#E2E8F5">heatmap</text>

    <rect x="763" y="287" width="55" height="22" rx="5" fill="none" stroke="#7C5CFF" stroke-width="1"/>
    <text x="790.5" y="303" text-anchor="middle" font-size="11" fill="#E2E8F5">edge</text>
    <rect x="825" y="287" width="68" height="22" rx="5" fill="none" stroke="#7C5CFF" stroke-width="1"/>
    <text x="859" y="303" text-anchor="middle" font-size="11" fill="#E2E8F5">overlay</text>
    <rect x="900" y="287" width="92" height="22" rx="5" fill="none" stroke="#7C5CFF" stroke-width="1"/>
    <text x="946" y="303" text-anchor="middle" font-size="11" fill="#E2E8F5">time-series</text>
    <rect x="999" y="287" width="51" height="22" rx="5" fill="none" stroke="#7C5CFF" stroke-width="1"/>
    <text x="1024.5" y="303" text-anchor="middle" font-size="11" fill="#E2E8F5">...</text>

    <!-- custom -->
    <rect x="763" y="316" width="287" height="22" rx="5" fill="none" stroke="#FF8B7A" stroke-width="1"/>
    <text x="906.5" y="332" text-anchor="middle" font-size="11" fill="#E2E8F5">+ custom shader layer</text>

    <text x="907" y="358" text-anchor="middle" font-size="10" fill="#9B7CFF" font-style="italic">stack any number · blend modes per layer</text>
  </g>
</svg>
