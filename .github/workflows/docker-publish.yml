name: Publish and Build Docker Image

run-name: >
  Image
  ${{ github.event_name == 'release' && github.ref_name
      || github.event_name == 'workflow_dispatch' && inputs.TAG_NAME
      || 'unknown-tag' }}

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      TAG_NAME:
        description: 'Tag name for test version'
        required: true
      BUILD_PHP:
        description: 'Build PHP server image'
        required: false
        type: boolean
        default: true
      BUILD_NODE:
        description: 'Build Node server image'
        required: false
        type: boolean
        default: true

env:
  TAG_NAME: ${{ github.event.inputs.TAG_NAME || github.event.release.tag_name }}

permissions:
  contents: read
  packages: write

jobs:
  build-php:
    name: Build PHP image
    if: ${{ github.event_name == 'release' || inputs.BUILD_PHP == true }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push PHP image on release
        if: ${{ github.event_name == 'release' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/php/Dockerfile
          push: true
          tags: |
            ghcr.io/rationai/xopat-php:${{ env.TAG_NAME }}
            ghcr.io/rationai/xopat-php:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push PHP image on dispatch
        if: ${{ github.event_name != 'release' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/php/Dockerfile
          push: true
          tags: |
            ghcr.io/rationai/xopat-php:${{ env.TAG_NAME }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  build-node:
    name: Build Node image
    if: ${{ github.event_name == 'release' || inputs.BUILD_NODE == true }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Node image on release
        if: ${{ github.event_name == 'release' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/node/Dockerfile
          push: true
          tags: |
            ghcr.io/rationai/xopat:${{ env.TAG_NAME }}
            ghcr.io/rationai/xopat:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push Node image on dispatch
        if: ${{ github.event_name != 'release' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/node/Dockerfile
          push: true
          tags: |
            ghcr.io/rationai/xopat:${{ env.TAG_NAME }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}