<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">

<head>
    <meta charset="utf-8">
    <title>Visualization Developer Setup</title>
    <template id="template-head"></template>
    <style>
        .editor-shell .editor-gutter {
            flex: 0 0 auto;
            width: 3rem;
            white-space: pre;
            tab-size: 4;
            line-height: inherit;
            font-variant-numeric: tabular-nums;
            overflow: hidden;
        }
        .editor-shell textarea {
            padding-top: 0.75rem;
            padding-bottom: 0.75rem;
            tab-size: 4;
            line-height: inherit;
            min-width: 0;
        }
    </style>
</head>

<body class="min-h-screen bg-base-100 text-base-content">

<div class="container mx-auto px-4 py-8 max-w-6xl">
    <div class="flex flex-col gap-4">
        <div class="flex justify-between items-center">
            <h1 class="text-3xl font-light">Developer visualization setup</h1>
            <button onclick="app.resetDefaults()" class="btn btn-ghost btn-xs text-error">Reset All Data</button>
        </div>

        <div class="w-full">
            <div class="tabs tabs-lifted w-full" id="tab-header">
            </div>

            <div class="bg-base-100 border-base-300 rounded-b-box rounded-tr-box border p-4 relative">

                <div class="absolute top-2 right-4 z-10 opacity-50 hover:opacity-100 transition-opacity">
                    <span class="text-xs font-mono" id="save-status">Saved</span>
                </div>

                <div class="editor-shell flex w-full h-[60vh] font-mono text-sm leading-relaxed">
                    <div id="line-numbers" class="editor-gutter select-none text-right pr-2 pl-1 py-3 text-base-content/40 border-r border-base-300 overflow-hidden whitespace-pre"
                         aria-hidden="true">1</div>
                    <textarea
                            class="textarea textarea-ghost flex-1 font-mono text-sm leading-relaxed focus:outline-none resize-none"
                            id="custom-params"
                            placeholder="Enter JSON configuration..."
                            spellcheck="false"
                            wrap="off"></textarea>
                </div>

                <label class="label">
                    <span class="label-text-alt text-error font-bold" id="json-error-msg"></span>
                </label>
            </div>
        </div>

        <div id="form-submit-container" class="flex justify-start mt-2"></div>

        <div class="divider"></div>

        <div id="documentation" class="prose max-w-none"></div>
    </div>
</div>

<script id="default-json-template" type="text/plain">{
    "params": {
        "customBlending": true,
        "ui": {
            "mainMenu": true,
            "scaleBar": true,
            "toolBar": true,
            "statusBar": true,
            "navigator": true,
            "appBar": true,
            "globalMenu": true
        }
    },
    "data": ["data-to-fetch-1", "data-to-fetch-2"],
    "background": [
        {
            "dataReference": 0
        }
    ],
    "visualizations": [
        {
            "name": "My visualization",
            "shaders": {
                "shader_id_1": {
                    "name": "Layer 1",
                    "type": "identity",
                    "visible": 1,
                    "fixed": false,
                    "dataReferences": [1],
                    "params": { }
                }
            }
        }
    ]
}</script>

<template id="template-form-init"></template>

<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

<script type="text/javascript">
    function escapeHtml(value) {
        return String(value ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function renderKeyValueTable(title, rows) {
        if (!rows || rows.length < 1) {
            return "";
        }
        return `
            <div class="mt-4">
                <div class="mb-2 font-semibold">${escapeHtml(title)}</div>
                <div class="overflow-x-auto">
                    <table class="table table-sm">
                        <thead><tr><th>Key</th><th>Type</th><th>Required</th><th>Default</th><th>Usage</th></tr></thead>
                        <tbody>
                            ${rows.map(row => `
                                <tr>
                                    <td><code>${escapeHtml(row.key || "")}</code></td>
                                    <td>${escapeHtml(row.type || "")}</td>
                                    <td>${escapeHtml(row.required ? "yes" : "no")}</td>
                                    <td><pre class="text-xs whitespace-pre-wrap">${escapeHtml(row.defaultText || "")}</pre></td>
                                    <td>${escapeHtml(row.usage || "")}</td>
                                </tr>
                            `).join("")}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }

    function normalizeSchemaRows(items, defaultKey = "default") {
        return (items || []).map(item => ({
            key: item.key,
            type: item.type || item.kind || "",
            required: !!item.required,
            defaultText: item[defaultKey] !== undefined && item[defaultKey] !== null
                ? JSON.stringify(item[defaultKey], null, 2)
                : "",
            usage: item.usage || ""
        }));
    }

    function renderControlTable(controls) {
        if (!controls || controls.length < 1) {
            return "";
        }
        return `
            <div class="mt-4">
                <div class="mb-2 font-semibold">UI Controls In <code>params</code></div>
                <div class="overflow-x-auto">
                    <table class="table table-sm">
                        <thead><tr><th>Key</th><th>Supported UI types</th><th>Default</th><th>Required</th><th>Usage</th></tr></thead>
                        <tbody>
                            ${controls.map(control => `
                                <tr>
                                    <td><code>${escapeHtml(control.key || "")}</code></td>
                                    <td>${escapeHtml((control.supportedUiTypes || []).join(", "))}</td>
                                    <td><pre class="text-xs whitespace-pre-wrap">${escapeHtml(control.defaultControlConfig !== null && control.defaultControlConfig !== undefined ? JSON.stringify(control.defaultControlConfig, null, 2) : "")}</pre></td>
                                    <td><pre class="text-xs whitespace-pre-wrap">${escapeHtml(control.requiredControlConfig !== null && control.requiredControlConfig !== undefined ? JSON.stringify(control.requiredControlConfig, null, 2) : "")}</pre></td>
                                    <td>${escapeHtml(control.usage || "")}</td>
                                </tr>
                            `).join("")}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }

    function renderAvailableControlsSection(docsNode, docsModel) {
        const controlsByGlType = docsModel?.controls || {};
        const glTypes = Object.keys(controlsByGlType);
        if (glTypes.length < 1) {
            return;
        }

        const section = document.createElement("section");
        section.className = "card bg-base-100 border border-base-300 shadow-sm mt-4";
        section.innerHTML = `
            <div class="card-body gap-4">
                <h2 class="card-title">Available UI Controls</h2>
                <div class="text-sm opacity-80">
                    These are renderer UI-control definitions grouped by GLSL type. They can back shader <code>params</code> entries where supported by a shader.
                </div>
            </div>
        `;

        const body = section.querySelector(".card-body");
        for (const glType of glTypes) {
            const controls = controlsByGlType[glType] || [];
            const block = document.createElement("div");
            block.className = "mt-2";
            block.innerHTML = `
                <div class="mb-2 font-semibold">GL Type: <code>${escapeHtml(glType)}</code></div>
                <div class="overflow-x-auto">
                    <table class="table table-sm">
                        <thead><tr><th>Name</th><th>Type</th><th>Supports</th><th>Summary</th></tr></thead>
                        <tbody>
                            ${controls.map(ctrl => `
                                <tr>
                                    <td><code>${escapeHtml(ctrl.name || "")}</code></td>
                                    <td>${escapeHtml(ctrl.type || "")}</td>
                                    <td><pre class="text-xs whitespace-pre-wrap">${escapeHtml(JSON.stringify(ctrl.supports || {}, null, 2))}</pre></td>
                                    <td>${escapeHtml(ctrl.classDocs?.summary || ctrl.classDocs?.description || "")}</td>
                                </tr>
                            `).join("")}
                        </tbody>
                    </table>
                </div>
            `;
            body.appendChild(block);
        }

        docsNode.appendChild(section);
    }

    function renderShaderConfigDocs(docsNode, configModel, docsModel, shaderConfigurator) {
        const previewByType = new Map((docsModel?.shaders || []).map(shader => [shader.type, shader.preview]));
        docsNode.innerHTML = `
            <section class="card bg-base-100 border border-base-300 shadow-sm">
                <div class="card-body">
                    <h2 class="card-title">Session Structure</h2>
                    <div class="text-sm opacity-80">
                        The JSON editor below posts a viewer session under the <code>visualization</code> field.
                        Top-level session keys are <code>params</code>, <code>data</code>, <code>background</code>, <code>visualizations</code>, and <code>plugins</code>.
                    </div>
                    <div class="overflow-x-auto mt-4">
                        <table class="table table-sm">
                            <thead><tr><th>Key</th><th>Type</th><th>Required</th><th>Usage</th></tr></thead>
                            <tbody>
                                <tr><td><code>params</code></td><td>object</td><td>no</td><td>Viewer parameters and defaults.</td></tr>
                                <tr><td><code>data</code></td><td>array</td><td>yes</td><td>Data specifications referenced by backgrounds and shader layers.</td></tr>
                                <tr><td><code>background</code></td><td>array</td><td>no</td><td>Image-group entries with <code>dataReference</code> and optional background shader stack.</td></tr>
                                <tr><td><code>visualizations</code></td><td>array</td><td>no</td><td>Visualization goals. Each item must define a <code>shaders</code> map.</td></tr>
                                <tr><td><code>plugins</code></td><td>object</td><td>no</td><td>Plugin id to plugin-specific configuration object.</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        `;

        for (const shader of configModel?.shaders || []) {
            const preview = previewByType.get(shader.type);
            const previewMarkup = preview
                ? shaderConfigurator._renderShaderPreviewMarkup(preview, "rounded-box border border-base-300 max-w-[150px] max-h-[150px] shrink-0")
                : "";
            const rootRows = normalizeSchemaRows(shader.rootConfig?.properties || []);
            const builtInRows = normalizeSchemaRows(shader.params?.builtIn || []);
            const customRows = normalizeSchemaRows(shader.params?.customParams || []);

            const card = document.createElement("section");
            card.className = "card bg-base-100 border border-base-300 shadow-sm";
            card.innerHTML = `
                <div class="card-body gap-4">
                    <div class="flex flex-wrap items-start justify-between gap-4">
                        <div class="min-w-[220px] flex-1">
                            <div class="card-title">${escapeHtml(shader.name || shader.type)}</div>
                            <div class="badge badge-outline mt-1">${escapeHtml(shader.type || "")}</div>
                            <div class="mt-2 text-sm opacity-80">${escapeHtml(shader.description || "")}</div>
                        </div>
                        ${previewMarkup ? `<div>${previewMarkup}</div>` : ""}
                    </div>

                    ${shader.sources?.length ? `
                        <div class="mt-2">
                            <div class="mb-2 font-semibold">Sources</div>
                            <div class="overflow-x-auto">
                                <table class="table table-sm">
                                    <thead><tr><th>#</th><th>Description</th><th>Accepted channels</th></tr></thead>
                                    <tbody>
                                        ${shader.sources.map(src => `
                                            <tr>
                                                <td>${escapeHtml(src.index)}</td>
                                                <td>${escapeHtml(src.description || "")}</td>
                                                <td>${escapeHtml(Array.isArray(src.acceptedChannelCounts) ? src.acceptedChannelCounts.join(", ") : "any")}</td>
                                            </tr>
                                        `).join("")}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    ` : ""}

                    ${renderKeyValueTable("Layer Object Fields", rootRows)}
                    ${renderKeyValueTable("Built-in Params", builtInRows)}
                    ${renderControlTable(shader.params?.controls || [])}
                    ${renderKeyValueTable("Custom Params", customRows)}
                </div>
            `;
            docsNode.appendChild(card);
        }

        renderAvailableControlsSection(docsNode, docsModel);
    }

    // --- App Logic ---
    const app = {
        storageKey: 'viz-dev-tabs-v1',
        tabs: [],
        activeTabId: null,
        editor: null,

        init: function() {
            this.editor = document.getElementById('custom-params');
            this.gutter = document.getElementById('line-numbers');
            this.loadState();

            // Event Listeners
            this.editor.addEventListener('input', () => this.handleInput());
            this.editor.addEventListener('scroll', () => {
                this.gutter.scrollTop = this.editor.scrollTop;
            });

            // Initial Render
            this.renderTabs();
            this.loadActiveContent();
        },

        renderLineNumbers: function() {
            const lines = (this.editor.value.match(/\n/g) || []).length + 1;
            let out = '';
            for (let i = 1; i <= lines; i++) out += i + '\n';
            this.gutter.textContent = out;
            this.gutter.scrollTop = this.editor.scrollTop;
        },

        getDefaultJson: function() {
            return document.getElementById('default-json-template').textContent;
        },

        loadState: function() {
            const stored = localStorage.getItem(this.storageKey);
            if (stored) {
                try {
                    const data = JSON.parse(stored);
                    this.tabs = data.tabs;
                    this.activeTabId = data.activeTabId;
                } catch (e) {
                    console.error("Failed to load state", e);
                    this.createDefaultState();
                }
            } else {
                this.createDefaultState();
            }
        },

        createDefaultState: function() {
            this.tabs = [{
                id: Date.now(),
                name: 'Config 1',
                content: this.getDefaultJson()
            }];
            this.activeTabId = this.tabs[0].id;
            this.saveState();
        },

        saveState: function() {
            // Ensure current editor content is saved to the active tab object before persisting
            this.updateActiveTabContent(this.editor.value);

            localStorage.setItem(this.storageKey, JSON.stringify({
                tabs: this.tabs,
                activeTabId: this.activeTabId
            }));

            $('#save-status').text('Saved ' + new Date().toLocaleTimeString());
        },

        resetDefaults: function() {
            if(confirm("Are you sure? This will delete all your saved tabs.")) {
                localStorage.removeItem(this.storageKey);
                location.reload();
            }
        },

        addTab: function() {
            const newId = Date.now();
            const newNum = this.tabs.length + 1;
            this.tabs.push({
                id: newId,
                name: `Config ${newNum}`,
                content: this.getDefaultJson()
            });
            this.switchTab(newId);
        },

        closeTab: function(e, id) {
            e.stopPropagation(); // Prevent switching when clicking close

            if (this.tabs.length <= 1) {
                alert("You cannot close the last tab.");
                return;
            }

            if (!confirm("Delete this tab?")) return;

            const index = this.tabs.findIndex(t => t.id === id);
            this.tabs.splice(index, 1);

            // If we closed the active tab, switch to the previous one (or first)
            if (id === this.activeTabId) {
                this.activeTabId = this.tabs[Math.max(0, index - 1)].id;
                this.loadActiveContent();
            }

            this.saveState();
            this.renderTabs();
        },

        switchTab: function(id) {
            // 1. Save current work
            this.updateActiveTabContent(this.editor.value);

            // 2. Switch ID
            this.activeTabId = id;

            // 3. Load new work
            this.loadActiveContent();
            this.renderTabs();
            this.saveState();
        },

        updateActiveTabContent: function(content) {
            const tab = this.tabs.find(t => t.id === this.activeTabId);
            if (tab) tab.content = content;
        },

        loadActiveContent: function() {
            const tab = this.tabs.find(t => t.id === this.activeTabId);
            if (tab) {
                this.editor.value = tab.content;
                this.validateJson(tab.content); // Check validity on load
                this.renderLineNumbers();
            }
        },

        handleInput: function() {
            const content = this.editor.value;
            this.validateJson(content);
            this.updateActiveTabContent(content);
            this.saveState();
            this.renderLineNumbers();
        },

        validateJson: function(str) {
            const errorEl = document.getElementById('json-error-msg');
            try {
                if (str.trim() === "") throw "Empty";
                JSON.parse(str);
                errorEl.textContent = "";
                this.editor.classList.remove('textarea-error');
            } catch (e) {
                errorEl.textContent = `Invalid JSON: ${e.message || e}`;
                this.editor.classList.add('textarea-error');
            }
        },

        renderTabs: function() {
            const container = document.getElementById('tab-header');
            let html = '';

            this.tabs.forEach(tab => {
                const isActive = tab.id === this.activeTabId;
                const activeClass = isActive ? 'tab-active [--tab-bg:var(--fallback-b1,oklch(var(--b1)))]' : '';

                html += `
                    <a class="tab tab-lifted ${activeClass} gap-2 group" onclick="app.switchTab(${tab.id})">
                        ${tab.name}
                        ${this.tabs.length > 1 ? `
                        <button onclick="app.closeTab(event, ${tab.id})"
                                class="btn btn-xs btn-circle btn-ghost opacity-0 group-hover:opacity-100 transition-opacity">
                            ✕
                        </button>` : ''}
                    </a>
                    `;
            });

            // Add "New Tab" button
            html += `
                <button class="tab tab-lifted" onclick="app.addTab()">
                    <span class="text-lg font-bold text-success">+</span>
                </button>
                <div class="tab tab-lifted flex-1 cursor-default"></div>
                `;

            container.innerHTML = html;
        }
    };

    // --- Standard Init ---
    window.addEventListener('load', _ => {
        // Initialize App
        app.init();

        // Legacy Form Handling
        window.formInit = $.extend(true, {
            location: "/",
            lang: { ready: "Ready!" }
        }, window.formInit || {});

        $("#form-submit-container").html(
            `<form method="POST" target="_blank" action="${formInit.location}" id="custom-request" class="w-full">
                    <input type="hidden" name="visualization" id="custom-visualization" value=''>
                    <button class="btn btn-primary btn-wide" type="submit" value="${formInit.lang.ready}">
                        ${formInit.lang.ready}
                    </button>
                </form>`
        );

        const shaderConfigurator = window.OpenSeadragon?.FlexRenderer?.ShaderConfigurator;

        if (shaderConfigurator) {
            // todo we should support relative paths - bug in the shader configurator
            shaderConfigurator.setPreviewAssetBasePath("/src/libs/flex-renderer/assets");

            const defaultPreview = {
                file: "default.png",
                alt: "Preview unavailable"
            };

            const originalBuildFallbackPreview =
                shaderConfigurator._buildFallbackPreview.bind(shaderConfigurator);

            shaderConfigurator._buildFallbackPreview = function(shaderMeta = {}) {
                return this._normalizePreviewDefinition(defaultPreview, shaderMeta)
                    || originalBuildFallbackPreview(shaderMeta);
            };

            const docsNode = document.getElementById('documentation');
            docsNode.classList.remove('prose');
            docsNode.classList.add('flex', 'flex-col', 'gap-6');

            if (typeof shaderConfigurator.compileConfigSchemaModel === 'function') {
                const configModel = shaderConfigurator.compileConfigSchemaModel();
                const docsModel = typeof shaderConfigurator.compileDocsModel === 'function'
                    ? shaderConfigurator.compileDocsModel()
                    : null;
                renderShaderConfigDocs(docsNode, configModel, docsModel, shaderConfigurator);
            } else if (typeof shaderConfigurator.compileDocsModel === 'function'
                && typeof shaderConfigurator.renderDocsPage === 'function') {
                const docsModel = shaderConfigurator.compileDocsModel();
                shaderConfigurator.renderDocsPage(docsNode, docsModel);
            } else if (typeof shaderConfigurator.buildShadersAndControlsDocs === 'function') {
                shaderConfigurator.buildShadersAndControlsDocs(docsNode);
            }
        }

        $('#custom-request').on('submit', evt => {
            // Ensure we send the current editor value
            document.getElementById("custom-visualization").value = $("#custom-params").val();
        });
    });
</script>
</body>
</html>
