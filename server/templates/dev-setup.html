<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">

<head>
    <meta charset="utf-8">
    <title>Visualization Developer Setup</title>
    <link rel="icon" type="image/png" sizes="32x32" href="src/assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="src/assets/favicon-16x16.png">
    <template id="template-head"></template>
    <style>
        .editor-shell .editor-gutter {
            flex: 0 0 auto;
            width: 3rem;
            white-space: pre;
            tab-size: 4;
            line-height: inherit;
            font-variant-numeric: tabular-nums;
            overflow: hidden;
        }
        .editor-shell textarea {
            padding-top: 0.75rem;
            padding-bottom: 0.75rem;
            tab-size: 4;
            line-height: inherit;
            min-width: 0;
        }
    </style>
</head>

<body class="min-h-screen bg-base-100 text-base-content">

<div class="container mx-auto px-4 py-8 max-w-7xl">
    <div class="flex flex-col gap-4">
        <div class="flex justify-between items-center">
            <h1 class="text-3xl font-light">Developer visualization setup</h1>
            <button onclick="app.resetDefaults()" class="btn btn-ghost btn-xs text-error">Reset All Data</button>
        </div>

        <div class="flex w-full gap-4 items-stretch">

            <!-- Left sidebar: session tabs -->
            <aside class="flex flex-col shrink-0 gap-2" style="width: 16rem;">
                <div class="flex items-center justify-between px-1">
                    <span class="text-sm font-semibold opacity-70">Sessions</span>
                    <div class="flex gap-1">
                        <button onclick="app.importFromFile()" class="btn btn-ghost btn-xs"
                                title="Import session(s) from a JSON file">Import</button>
                        <button onclick="app.exportAll()" class="btn btn-ghost btn-xs"
                                title="Export all sessions to a single file">Export all</button>
                    </div>
                </div>

                <ul id="tab-list" class="menu menu-sm bg-base-200 rounded-box overflow-y-auto flex-nowrap"
                    style="flex: 1 1 auto; min-height: 0; max-height: 60vh;"></ul>

                <button onclick="app.addTab()" class="btn btn-sm btn-ghost border border-dashed border-base-300">
                    <span class="text-lg font-bold text-success leading-none">+</span> New session
                </button>

                <input type="file" id="import-file-input" accept="application/json,.json" multiple class="hidden">
            </aside>

            <!-- Editor -->
            <div class="flex-1 min-w-0 bg-base-100 border border-base-300 rounded-box p-4 relative flex flex-col">

                <div class="flex items-center justify-between gap-3 mb-2">
                    <input id="active-tab-name"
                           class="input input-ghost input-sm font-semibold px-1 min-w-0 flex-1 max-w-xs"
                           title="Rename this session" placeholder="Session name" spellcheck="false">
                    <div class="flex items-center gap-3 shrink-0">
                        <button onclick="app.exportActive()" class="btn btn-ghost btn-xs"
                                title="Export this session to a file">Export</button>
                        <span class="text-xs font-mono opacity-50" id="save-status">Saved</span>
                    </div>
                </div>

                <div class="editor-shell flex w-full font-mono text-sm leading-relaxed" style="height: 60vh;">
                    <div id="line-numbers" class="editor-gutter select-none text-right pr-2 pl-1 py-3 text-base-content/40 border-r border-base-300 overflow-hidden whitespace-pre"
                         aria-hidden="true">1</div>
                    <textarea
                            class="textarea textarea-ghost flex-1 font-mono text-sm leading-relaxed focus:outline-none resize-none"
                            id="custom-params"
                            placeholder="Enter JSON configuration..."
                            spellcheck="false"
                            wrap="off"></textarea>
                </div>

                <label class="label">
                    <span class="label-text-alt text-error font-bold" id="json-error-msg"></span>
                </label>
            </div>
        </div>

        <div id="form-submit-container" class="flex justify-start mt-2"></div>

        <div class="divider"></div>

        <div id="documentation" class="prose max-w-none"></div>
    </div>
</div>

<script id="default-json-template" type="text/plain">{
    "params": {
        "customBlending": true,
        "ui": {
            "mainMenu": true,
            "scaleBar": true,
            "toolBar": true,
            "statusBar": true,
            "navigator": true,
            "appBar": true,
            "globalMenu": true
        }
    },
    "data": ["data-to-fetch-1", "data-to-fetch-2"],
    "background": [
        {
            "dataReference": 0
        }
    ],
    "visualizations": [
        {
            "name": "My visualization",
            "shaders": {
                "shader_id_1": {
                    "name": "Layer 1",
                    "type": "identity",
                    "visible": 1,
                    "fixed": false,
                    "dataReferences": [1],
                    "params": { }
                }
            }
        }
    ]
}</script>

<template id="template-form-init"></template>

<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

<script type="text/javascript">
    function escapeHtml(value) {
        return String(value ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function renderKeyValueTable(title, rows) {
        if (!rows || rows.length < 1) {
            return "";
        }
        return `
            <div class="mt-4">
                <div class="mb-2 font-semibold">${escapeHtml(title)}</div>
                <div class="overflow-x-auto">
                    <table class="table table-sm">
                        <thead><tr><th>Key</th><th>Type</th><th>Required</th><th>Default</th><th>Usage</th></tr></thead>
                        <tbody>
                            ${rows.map(row => `
                                <tr>
                                    <td><code>${escapeHtml(row.key || "")}</code></td>
                                    <td>${escapeHtml(row.type || "")}</td>
                                    <td>${escapeHtml(row.required ? "yes" : "no")}</td>
                                    <td><pre class="text-xs whitespace-pre-wrap">${escapeHtml(row.defaultText || "")}</pre></td>
                                    <td>${escapeHtml(row.usage || "")}</td>
                                </tr>
                            `).join("")}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }

    function normalizeSchemaRows(items, defaultKey = "default") {
        return (items || []).map(item => ({
            key: item.key,
            type: item.type || item.kind || "",
            required: !!item.required,
            defaultText: item[defaultKey] !== undefined && item[defaultKey] !== null
                ? JSON.stringify(item[defaultKey], null, 2)
                : "",
            usage: item.usage || ""
        }));
    }

    function renderControlTable(controls) {
        if (!controls || controls.length < 1) {
            return "";
        }
        return `
            <div class="mt-4">
                <div class="mb-2 font-semibold">UI Controls In <code>params</code></div>
                <div class="overflow-x-auto">
                    <table class="table table-sm">
                        <thead><tr><th>Key</th><th>Supported UI types</th><th>Default</th><th>Required</th><th>Usage</th></tr></thead>
                        <tbody>
                            ${controls.map(control => `
                                <tr>
                                    <td><code>${escapeHtml(control.key || "")}</code></td>
                                    <td>${escapeHtml((control.supportedUiTypes || []).join(", "))}</td>
                                    <td><pre class="text-xs whitespace-pre-wrap">${escapeHtml(control.defaultControlConfig !== null && control.defaultControlConfig !== undefined ? JSON.stringify(control.defaultControlConfig, null, 2) : "")}</pre></td>
                                    <td><pre class="text-xs whitespace-pre-wrap">${escapeHtml(control.requiredControlConfig !== null && control.requiredControlConfig !== undefined ? JSON.stringify(control.requiredControlConfig, null, 2) : "")}</pre></td>
                                    <td>${escapeHtml(control.usage || "")}</td>
                                </tr>
                            `).join("")}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }

    function renderAvailableControlsSection(docsNode, docsModel) {
        const controlsByGlType = docsModel?.controls || {};
        const glTypes = Object.keys(controlsByGlType);
        if (glTypes.length < 1) {
            return;
        }

        const section = document.createElement("section");
        section.className = "card bg-base-100 border border-base-300 shadow-sm mt-4";
        section.innerHTML = `
            <div class="card-body gap-4">
                <h2 class="card-title">Available UI Controls</h2>
                <div class="text-sm opacity-80">
                    These are renderer UI-control definitions grouped by GLSL type. They can back shader <code>params</code> entries where supported by a shader.
                </div>
            </div>
        `;

        const body = section.querySelector(".card-body");
        for (const glType of glTypes) {
            const controls = controlsByGlType[glType] || [];
            const block = document.createElement("div");
            block.className = "mt-2";
            block.innerHTML = `
                <div class="mb-2 font-semibold">GL Type: <code>${escapeHtml(glType)}</code></div>
                <div class="overflow-x-auto">
                    <table class="table table-sm">
                        <thead><tr><th>Name</th><th>Type</th><th>Supports</th><th>Summary</th></tr></thead>
                        <tbody>
                            ${controls.map(ctrl => `
                                <tr>
                                    <td><code>${escapeHtml(ctrl.name || "")}</code></td>
                                    <td>${escapeHtml(ctrl.type || "")}</td>
                                    <td><pre class="text-xs whitespace-pre-wrap">${escapeHtml(JSON.stringify(ctrl.supports || {}, null, 2))}</pre></td>
                                    <td>${escapeHtml(ctrl.classDocs?.summary || ctrl.classDocs?.description || "")}</td>
                                </tr>
                            `).join("")}
                        </tbody>
                    </table>
                </div>
            `;
            body.appendChild(block);
        }

        docsNode.appendChild(section);
    }

    function describeJsonSchemaType(schema) {
        if (!schema || typeof schema !== "object") return "";
        if (schema.type) return Array.isArray(schema.type) ? schema.type.join(" | ") : schema.type;
        if (schema.const !== undefined) return `const: ${JSON.stringify(schema.const)}`;
        if (schema.$ref) return schema.$ref;
        if (Array.isArray(schema.oneOf)) return "oneOf";
        if (Array.isArray(schema.anyOf)) return "anyOf";
        if (Array.isArray(schema.allOf)) return "allOf";
        return "";
    }

    function jsonSchemaPropertyToRow(key, schema, required) {
        return {
            key,
            type: describeJsonSchemaType(schema),
            required,
            default: schema?.default,
            usage: schema?.description || ""
        };
    }

    function extractRootConfigRows(layerSchema) {
        if (!layerSchema?.properties) return [];
        const required = new Set(layerSchema.required || []);
        return Object.entries(layerSchema.properties)
            .filter(([key]) => key !== "params")
            .map(([key, sub]) => jsonSchemaPropertyToRow(key, sub, required.has(key)));
    }

    function extractBuiltInRows(layerSchema, excludeKeys) {
        const paramsSchema = layerSchema?.properties?.params;
        if (!paramsSchema?.properties) return [];
        const required = new Set(paramsSchema.required || []);
        return Object.entries(paramsSchema.properties)
            .filter(([key]) => !excludeKeys.has(key))
            .map(([key, sub]) => jsonSchemaPropertyToRow(key, sub, required.has(key)));
    }

    function controlDescriptorToRow(ctrl) {
        return {
            key: ctrl.name,
            supportedUiTypes: ctrl.supportedTypes || [],
            defaultControlConfig: ctrl.default,
            requiredControlConfig: ctrl.required,
            usage: ctrl.usage || ""
        };
    }

    function customParamDescriptorToRow(param) {
        return {
            key: param.name,
            type: param.type || "",
            required: !!param.required,
            default: param.default,
            usage: param.usage || ""
        };
    }

    // Core viewer `params` keys, mirroring src/config.json `setup` block (xoParams typedef).
    // Defaults shown here are the shipped config.json defaults; a deployment may override them.
    const CORE_PARAMS_DOCS = [
        { key: "sessionName", type: "string", default: null, usage: "Viewer session name/ID. Can be overridden on background-level configuration." },
        { key: "locale", type: "string", default: "en", usage: "UI language; must match an available locale in locales/." },
        { key: "customBlending", type: "boolean", default: false, usage: "Enable custom WebGL blending of shader layers." },
        { key: "debugMode", type: "boolean", default: false, usage: "Enable application debug mode." },
        { key: "webglDebugMode", type: "boolean", default: false, usage: "Enable WebGL renderer debug output." },
        { key: "scaleBar", type: "boolean", default: true, usage: "Deprecated flat alias of ui.scaleBar." },
        { key: "toolBar", type: "boolean", default: true, usage: "Deprecated flat alias of ui.toolBar." },
        { key: "statusBar", type: "boolean", default: true, usage: "Deprecated flat alias of ui.statusBar." },
        { key: "ui", type: "object", default: { scaleBar: true, toolBar: true, statusBar: true, mainMenu: true, navigator: true, appBar: true, globalMenu: true }, usage: "Initial visible state of UI components. false boots the component collapsed; the user can still toggle it back via settings or the hide-UI button." },
        { key: "backgroundColor", type: "string", default: null, usage: "Default background color, a hex RGB or RGBA string." },
        { key: "viewport", type: "object", default: null, usage: "Default viewport position {\"zoomLevel\":<zoom>,\"point\":{\"x\":<x>,\"y\":<y>}} in OpenSeadragon viewport coordinates." },
        { key: "activeBackgroundIndex", type: "number", default: 0, usage: "Default active background (image group) index." },
        { key: "activeVisualizationIndex", type: "number", default: 0, usage: "Default active visualization (data group) index." },
        { key: "grayscale", type: "boolean", default: false, usage: "Render the viewer in grayscale." },
        { key: "tileCache", type: "boolean", default: true, usage: "Enable tile caching." },
        { key: "preventNavigationShortcuts", type: "boolean", default: false, usage: "Disable navigation keyboard shortcuts." },
        { key: "scrollRequiresCtrl", type: "boolean", default: false, usage: "Require Ctrl/Cmd + wheel to zoom; plain wheel falls through to the host page. Recommended for notebook / scrollable-host embeddings." },
        { key: "reverseScroll", type: "boolean", default: false, usage: "Invert the scroll-to-zoom direction (scroll down to zoom in, up to zoom out). Composes with scrollRequiresCtrl." },
        { key: "permaLoadPlugins", type: "boolean", default: true, usage: "Persist loaded plugins across sessions." },
        { key: "bypassCloseConfirmation", type: "boolean", default: false, usage: "Suppress the browser's \"Leave site?\" prompt when there are unsaved changes." },
        { key: "bypassCookies", type: "boolean", default: false, usage: "Disable cookies support." },
        { key: "bypassCache", type: "boolean", default: false, usage: "Disable cache data loading." },
        { key: "bypassCacheLoadTime", type: "boolean", default: false, usage: "Skip cached load-time restore." },
        { key: "theme", type: "string", default: "auto", usage: "\"auto\" (follows the OS preference), \"dark\" or \"light\"." },
        { key: "maxImageCacheCount", type: "number", default: 1200, usage: "Maximum number of cached image tiles." },
        { key: "webGlPreferredVersion", type: "string", default: "2.0", usage: "Preferred WebGL version (only 2.0 supported for now)." },
        { key: "preferredFormat", type: "string", default: "zip", usage: "Deprecated." },
        { key: "disablePluginsUi", type: "boolean", default: false, usage: "Do not render plugin selection in the GUI; plugins can still be active." },
        { key: "disablePluginsAutoload", type: "boolean", default: false, usage: "Skip the _plugins cookie restore this session; permaLoad and session-declared plugins still load." },
        { key: "valueInspectorEnabled", type: "boolean", default: false, usage: "Enable the pixel value inspector." },
        { key: "visualizationInspectorEnabled", type: "boolean", default: false, usage: "Enable the visualization inspector." },
        { key: "visualizationInspectorMode", type: "string", default: "reveal-inside", usage: "Visualization inspector mode." },
        { key: "visualizationInspectorRadiusPx", type: "number", default: 96, usage: "Visualization inspector lens radius in pixels." },
        { key: "visualizationInspectorLensZoom", type: "number", default: 2, usage: "Visualization inspector lens zoom factor." },
        { key: "isStaticPreview", type: "boolean", default: false, usage: "Render viewer in standalone static mode (all data static). Leave false if unsure." },
        { key: "historySize", type: "number", default: 50, usage: "Maximum undo/redo history size." },
        { key: "maxMobileWidthPx", type: "number", default: 900, usage: "Maximum viewport width treated as the mobile layout." },
        { key: "globalMenuMaxWidth", type: "number", default: 1200, usage: "Maximum width of the global menu in pixels." },
        { key: "notificationsPosition", type: "string", default: "bottom", usage: "Position of notifications." }
    ];

    function renderCoreParamsSection(docsNode) {
        const section = document.createElement("section");
        section.className = "card bg-base-100 border border-base-300 shadow-sm";
        section.innerHTML = `
            <div class="card-body">
                <h2 class="card-title">Core <code>params</code> Configuration</h2>
                <div class="text-sm opacity-80">
                    Supported keys inside the session top-level <code>params</code> object. These mirror the viewer
                    defaults defined in <code>src/config.json</code> (the <code>setup</code> block, <code>xoParams</code> typedef);
                    any key set here overrides the deployment default for this session.
                </div>
                ${renderKeyValueTable("Viewer params", normalizeSchemaRows(CORE_PARAMS_DOCS))}
            </div>
        `;
        docsNode.appendChild(section);
    }

    function renderShaderConfigDocs(docsNode, configModel, docsModel, shaderConfigurator) {
        const shaderLayerSchemas = configModel?.$defs?.shaderLayers || {};
        docsNode.innerHTML = `
            <section class="card bg-base-100 border border-base-300 shadow-sm">
                <div class="card-body">
                    <h2 class="card-title">Session Structure</h2>
                    <div class="text-sm opacity-80">
                        The JSON editor below posts a viewer session under the <code>visualization</code> field.
                        Top-level session keys are <code>params</code>, <code>data</code>, <code>background</code>, <code>visualizations</code>, and <code>plugins</code>.
                    </div>
                    <div class="overflow-x-auto mt-4">
                        <table class="table table-sm">
                            <thead><tr><th>Key</th><th>Type</th><th>Required</th><th>Usage</th></tr></thead>
                            <tbody>
                                <tr><td><code>params</code></td><td>object</td><td>no</td><td>Viewer parameters and defaults — see <em>Core <code>params</code> Configuration</em> below.</td></tr>
                                <tr><td><code>data</code></td><td>array</td><td>yes</td><td>Data specifications referenced by backgrounds and shader layers.</td></tr>
                                <tr><td><code>background</code></td><td>array</td><td>no</td><td>Image-group entries with <code>dataReference</code> and optional background shader stack.</td></tr>
                                <tr><td><code>visualizations</code></td><td>array</td><td>no</td><td>Visualization goals. Each item must define a <code>shaders</code> map.</td></tr>
                                <tr><td><code>plugins</code></td><td>object</td><td>no</td><td>Plugin id to plugin-specific configuration object.</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        `;

        renderCoreParamsSection(docsNode);

        for (const shader of docsModel?.shaders || []) {
            const preview = shader.preview;
            const previewMarkup = preview
                ? shaderConfigurator._renderShaderPreviewMarkup(preview, "rounded-box border border-base-300 max-w-[150px] max-h-[150px] shrink-0")
                : "";
            const layerSchema = shaderLayerSchemas[shader.type];
            const controlKeys = new Set((shader.controls || []).map(c => c.name));
            const customKeys = new Set((shader.customParams || []).map(c => c.name));
            const excludeFromBuiltIn = new Set([...controlKeys, ...customKeys]);
            const rootRows = normalizeSchemaRows(extractRootConfigRows(layerSchema));
            const builtInRows = normalizeSchemaRows(extractBuiltInRows(layerSchema, excludeFromBuiltIn));
            const controlRows = (shader.controls || []).map(controlDescriptorToRow);
            const customRows = normalizeSchemaRows((shader.customParams || []).map(customParamDescriptorToRow));

            const sourcesMarkup = shader.sources?.length ? `
                <div class="mt-2">
                    <div class="mb-2 font-semibold">Sources</div>
                    <div class="overflow-x-auto">
                        <table class="table table-sm">
                            <thead><tr><th>#</th><th>Description</th><th>Accepted channels</th></tr></thead>
                            <tbody>
                                ${shader.sources.map(src => `
                                    <tr>
                                        <td>${escapeHtml(src.index)}</td>
                                        <td>${escapeHtml(src.description || "")}</td>
                                        <td>${escapeHtml(Array.isArray(src.acceptedChannelCounts) ? src.acceptedChannelCounts.join(", ") : "any")}</td>
                                    </tr>
                                `).join("")}
                            </tbody>
                        </table>
                    </div>
                </div>
            ` : "";

            const detailsMarkup = [
                sourcesMarkup,
                renderKeyValueTable("Layer Object Fields", rootRows),
                renderKeyValueTable("Built-in Params", builtInRows),
                renderControlTable(controlRows),
                renderKeyValueTable("Custom Params", customRows)
            ].join("");

            const card = document.createElement("section");
            card.className = "card bg-base-100 border border-base-300 shadow-sm";
            card.innerHTML = `
                <div class="card-body gap-4">
                    <div class="flex flex-wrap items-start justify-between gap-4">
                        <div class="min-w-[220px] flex-1">
                            <div class="card-title">${escapeHtml(shader.name || shader.type)}</div>
                            <div class="badge badge-outline mt-1">${escapeHtml(shader.type || "")}</div>
                            <div class="mt-2 text-sm opacity-80">${escapeHtml(shader.description || "")}</div>
                        </div>
                        ${previewMarkup ? `<div>${previewMarkup}</div>` : ""}
                    </div>

                    ${detailsMarkup.trim() ? `
                    <details class="border-t border-base-300 pt-2">
                        <summary class="cursor-pointer select-none font-semibold text-sm opacity-80 marker:text-base-content/40">
                            Layer details &amp; parameters
                        </summary>
                        <div class="mt-2 flex flex-col gap-4">
                            ${detailsMarkup}
                        </div>
                    </details>` : ""}
                </div>
            `;
            docsNode.appendChild(card);
        }

        renderAvailableControlsSection(docsNode, docsModel);
    }

    // --- App Logic ---
    const app = {
        storageKey: 'viz-dev-tabs-v1',
        bundleType: 'xopat-dev-sessions',
        tabs: [],
        activeTabId: null,
        editor: null,
        _nextId: 1,

        init: function() {
            this.editor = document.getElementById('custom-params');
            this.gutter = document.getElementById('line-numbers');
            this.nameInput = document.getElementById('active-tab-name');
            this.fileInput = document.getElementById('import-file-input');
            this.loadState();

            // Event Listeners
            this.editor.addEventListener('input', () => this.handleInput());
            this.editor.addEventListener('scroll', () => {
                this.gutter.scrollTop = this.editor.scrollTop;
            });

            // Inline rename of the active session
            this.nameInput.addEventListener('input', () => {
                const tab = this.getActiveTab();
                if (!tab) return;
                tab.name = this.nameInput.value;
                this.renderTabs();
                this.saveState();
            });

            // File import
            this.fileInput.addEventListener('change', (e) => {
                this.handleImportFiles(e.target.files);
                e.target.value = ''; // allow re-importing the same file
            });

            // Initial Render
            this.renderTabs();
            this.loadActiveContent();
        },

        nextId: function() {
            return this._nextId++;
        },

        getActiveTab: function() {
            return this.tabs.find(t => t.id === this.activeTabId) || null;
        },

        renderLineNumbers: function() {
            const lines = (this.editor.value.match(/\n/g) || []).length + 1;
            let out = '';
            for (let i = 1; i <= lines; i++) out += i + '\n';
            this.gutter.textContent = out;
            this.gutter.scrollTop = this.editor.scrollTop;
        },

        getDefaultJson: function() {
            return document.getElementById('default-json-template').textContent;
        },

        // Coerce arbitrary stored/imported tab data into a valid {id, name, content}.
        normalizeTab: function(raw, fallbackName) {
            if (!raw || typeof raw !== 'object') return null;
            if (typeof raw.content !== 'string') return null;
            const name = (typeof raw.name === 'string' && raw.name.trim()) ? raw.name : (fallbackName || 'Config');
            return { id: this.nextId(), name, content: raw.content };
        },

        loadState: function() {
            const stored = localStorage.getItem(this.storageKey);
            if (stored) {
                try {
                    const data = JSON.parse(stored);
                    const tabs = Array.isArray(data && data.tabs) ? data.tabs : [];
                    this.tabs = tabs
                        .map((t, i) => this.normalizeTab(t, `Config ${i + 1}`))
                        .filter(Boolean);
                    if (this.tabs.length) {
                        // Stored activeTabId no longer matches regenerated ids; restore by index.
                        const idx = tabs.findIndex(t => t && t.id === (data && data.activeTabId));
                        this.activeTabId = this.tabs[idx >= 0 ? idx : 0].id;
                        return;
                    }
                } catch (e) {
                    console.error("Failed to load state", e);
                }
            }
            this.createDefaultState();
        },

        createDefaultState: function() {
            this.tabs = [{
                id: this.nextId(),
                name: 'Config 1',
                content: this.getDefaultJson()
            }];
            this.activeTabId = this.tabs[0].id;
            this.saveState();
        },

        saveState: function() {
            // Ensure current editor content is saved to the active tab object before persisting
            this.updateActiveTabContent(this.editor.value);

            localStorage.setItem(this.storageKey, JSON.stringify({
                tabs: this.tabs,
                activeTabId: this.activeTabId
            }));

            $('#save-status').text('Saved ' + new Date().toLocaleTimeString());
        },

        resetDefaults: function() {
            if(confirm("Are you sure? This will delete all your saved sessions.")) {
                localStorage.removeItem(this.storageKey);
                location.reload();
            }
        },

        addTab: function() {
            const newId = this.nextId();
            this.tabs.push({
                id: newId,
                name: `Config ${this.tabs.length + 1}`,
                content: this.getDefaultJson()
            });
            this.switchTab(newId);
        },

        closeTab: function(e, id) {
            if (e) e.stopPropagation(); // Prevent switching when clicking close

            if (this.tabs.length <= 1) {
                alert("You cannot close the last session.");
                return;
            }

            const index = this.tabs.findIndex(t => t.id === id);
            if (index < 0) return;

            if (!confirm(`Delete session "${this.tabs[index].name}"?`)) return;

            this.tabs.splice(index, 1);

            // If we closed the active tab, switch to the previous one (or first)
            if (id === this.activeTabId) {
                this.activeTabId = this.tabs[Math.max(0, index - 1)].id;
                this.loadActiveContent();
            }

            this.saveState();
            this.renderTabs();
        },

        switchTab: function(id) {
            // 1. Save current work
            this.updateActiveTabContent(this.editor.value);

            // 2. Switch ID
            this.activeTabId = id;

            // 3. Load new work
            this.loadActiveContent();
            this.renderTabs();
            this.saveState();
        },

        updateActiveTabContent: function(content) {
            const tab = this.getActiveTab();
            if (tab) tab.content = content;
        },

        loadActiveContent: function() {
            const tab = this.getActiveTab();
            if (tab) {
                this.editor.value = tab.content;
                this.nameInput.value = tab.name;
                this.validateJson(tab.content); // Check validity on load
                this.renderLineNumbers();
            }
        },

        handleInput: function() {
            const content = this.editor.value;
            this.validateJson(content);
            this.updateActiveTabContent(content);
            this.saveState();
            this.renderLineNumbers();
        },

        validateJson: function(str) {
            const errorEl = document.getElementById('json-error-msg');
            try {
                if (str.trim() === "") throw "Empty";
                JSON.parse(str);
                errorEl.textContent = "";
                this.editor.classList.remove('textarea-error');
            } catch (e) {
                errorEl.textContent = `Invalid JSON: ${e.message || e}`;
                this.editor.classList.add('textarea-error');
            }
        },

        // --- Import / Export ---

        safeFileName: function(name) {
            const cleaned = String(name || 'session').replace(/[^a-z0-9_\-]+/gi, '_').slice(0, 60);
            return cleaned || 'session';
        },

        download: function(filename, text) {
            const blob = new Blob([text], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        },

        exportTab: function(e, id) {
            if (e) e.stopPropagation();
            // Persist the latest editor value before reading the tab.
            this.updateActiveTabContent(this.editor.value);
            const tab = this.tabs.find(t => t.id === id) || this.getActiveTab();
            if (!tab) return;
            this.download(this.safeFileName(tab.name) + '.json', tab.content);
        },

        exportActive: function() {
            this.exportTab(null, this.activeTabId);
        },

        exportAll: function() {
            this.updateActiveTabContent(this.editor.value);
            const bundle = {
                type: this.bundleType,
                version: 1,
                tabs: this.tabs.map(t => ({ name: t.name, content: t.content }))
            };
            this.download('xopat-dev-sessions.json', JSON.stringify(bundle, null, 2));
        },

        importFromFile: function() {
            this.fileInput.click();
        },

        // Append a session without switching to it. Returns the new id.
        addImportedTab: function(name, content) {
            const id = this.nextId();
            this.tabs.push({ id, name: (name && String(name).trim()) || 'Imported', content });
            return id;
        },

        handleImportFiles: function(fileList) {
            const files = Array.from(fileList || []);
            if (!files.length) return;

            // Save current edits so they survive the re-render after import.
            this.updateActiveTabContent(this.editor.value);

            let pending = files.length;
            let firstNewId = null;

            const finalize = () => {
                if (--pending > 0) return;
                this.saveState();
                if (firstNewId !== null) this.switchTab(firstNewId);
                else this.renderTabs();
            };

            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = () => {
                    const text = String(reader.result || '');
                    const baseName = file.name.replace(/\.json$/i, '');
                    let parsed = null;
                    try { parsed = JSON.parse(text); } catch (e) { /* keep raw below */ }

                    if (parsed && Array.isArray(parsed.tabs)) {
                        // Multi-session bundle (from "Export all").
                        parsed.tabs.forEach((t, i) => {
                            if (t && typeof t.content === 'string') {
                                const id = this.addImportedTab(t.name || `${baseName} ${i + 1}`, t.content);
                                if (firstNewId === null) firstNewId = id;
                            }
                        });
                    } else {
                        // Single config file — import its raw text so the user can fix invalid JSON too.
                        const id = this.addImportedTab(baseName, text);
                        if (firstNewId === null) firstNewId = id;
                    }
                    finalize();
                };
                reader.onerror = () => {
                    alert(`Could not read file: ${file.name}`);
                    finalize();
                };
                reader.readAsText(file);
            });
        },

        renderTabs: function() {
            const list = document.getElementById('tab-list');
            list.innerHTML = this.tabs.map(tab => {
                const active = tab.id === this.activeTabId;
                const closeBtn = this.tabs.length > 1
                    ? `<span class="hover:text-error cursor-pointer" title="Delete this session"
                             onclick="app.closeTab(event, ${tab.id})">✕</span>`
                    : '';
                return `
                    <li>
                        <a class="${active ? 'active' : ''} group flex items-center justify-between gap-2"
                           onclick="app.switchTab(${tab.id})">
                            <span class="truncate flex-1">${escapeHtml(tab.name || 'Config')}</span>
                            <span class="flex items-center gap-2 opacity-40 group-hover:opacity-100 transition-opacity">
                                <span class="hover:text-primary cursor-pointer" title="Export this session"
                                      onclick="app.exportTab(event, ${tab.id})">⭳</span>
                                ${closeBtn}
                            </span>
                        </a>
                    </li>`;
            }).join('');
        }
    };

    // --- Standard Init ---
    window.addEventListener('load', _ => {
        // Initialize App
        app.init();

        // Legacy Form Handling
        window.formInit = $.extend(true, {
            location: "/",
            lang: { ready: "Ready!" }
        }, window.formInit || {});

        $("#form-submit-container").html(
            `<form method="POST" target="_blank" action="${formInit.location}" id="custom-request" class="w-full">
                    <input type="hidden" name="visualization" id="custom-visualization" value=''>
                    <button class="btn btn-primary btn-wide" type="submit" value="${formInit.lang.ready}">
                        ${formInit.lang.ready}
                    </button>
                </form>`
        );

        const shaderConfigurator = window.OpenSeadragon?.FlexRenderer?.ShaderConfigurator;

        if (shaderConfigurator) {
            // todo we should support relative paths - bug in the shader configurator
            shaderConfigurator.setPreviewAssetBasePath("/src/libs/flex-renderer/assets");

            const defaultPreview = {
                file: "default.png",
                alt: "Preview unavailable"
            };

            const originalBuildFallbackPreview =
                shaderConfigurator._buildFallbackPreview.bind(shaderConfigurator);

            shaderConfigurator._buildFallbackPreview = function(shaderMeta = {}) {
                return this._normalizePreviewDefinition(defaultPreview, shaderMeta)
                    || originalBuildFallbackPreview(shaderMeta);
            };

            const docsNode = document.getElementById('documentation');
            docsNode.classList.remove('prose');
            docsNode.classList.add('flex', 'flex-col', 'gap-6');

            if (typeof shaderConfigurator.compileConfigSchemaModel === 'function') {
                const configModel = shaderConfigurator.compileConfigSchemaModel();
                const docsModel = typeof shaderConfigurator.compileDocsModel === 'function'
                    ? shaderConfigurator.compileDocsModel()
                    : null;
                renderShaderConfigDocs(docsNode, configModel, docsModel, shaderConfigurator);
            } else if (typeof shaderConfigurator.compileDocsModel === 'function'
                && typeof shaderConfigurator.renderDocsPage === 'function') {
                const docsModel = shaderConfigurator.compileDocsModel();
                shaderConfigurator.renderDocsPage(docsNode, docsModel);
            } else if (typeof shaderConfigurator.buildShadersAndControlsDocs === 'function') {
                shaderConfigurator.buildShadersAndControlsDocs(docsNode);
            }
        }

        $('#custom-request').on('submit', evt => {
            // Ensure we send the current editor value
            document.getElementById("custom-visualization").value = $("#custom-params").val();
        });
    });
</script>
</body>
